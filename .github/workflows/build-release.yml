name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          VER="${TAG#v}"
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "ver=$VER"   >> "$GITHUB_OUTPUT"
          echo "Version: $VER (tag: $TAG)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle wrapper
        run: |
          GRADLE_VER=8.5
          curl -sLO "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip"
          unzip -q "gradle-${GRADLE_VER}-bin.zip"
          mkdir -p /tmp/wrapper-gen/gradle/wrapper
          touch /tmp/wrapper-gen/settings.gradle
          cd /tmp/wrapper-gen
          "$GITHUB_WORKSPACE/gradle-${GRADLE_VER}/bin/gradle" wrapper --gradle-version ${GRADLE_VER}
          cp -f gradlew gradlew.bat "$GITHUB_WORKSPACE/"
          mkdir -p "$GITHUB_WORKSPACE/gradle/wrapper"
          cp -f gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties "$GITHUB_WORKSPACE/gradle/wrapper/"
          cd "$GITHUB_WORKSPACE"
          rm -rf "gradle-${GRADLE_VER}-bin.zip" "gradle-${GRADLE_VER}" /tmp/wrapper-gen
          chmod +x gradlew

      - name: Bootstrap signing keystore
        run: |
          KSDIR="$HOME/.android"
          KSPATH="$KSDIR/budcontrol.keystore"
          mkdir -p "$KSDIR"
          if [ -f "app/budcontrol.keystore" ]; then
            echo "Using committed keystore"
            cp app/budcontrol.keystore "$KSPATH"
          else
            echo "Generating new keystore (first run) and committing to repo"
            keytool -genkeypair \
              -keystore "$KSPATH" \
              -alias budcontrol \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass budcontrol -keypass budcontrol \
              -dname "CN=BudControl, O=BudControl, L=NYC, ST=NY, C=US"
            cp "$KSPATH" app/budcontrol.keystore
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add -f app/budcontrol.keystore
            git commit -m "chore: add persistent signing keystore"
            git push origin HEAD:master
          fi

      - name: Build debug APKs (phone + wear)
        run: ./gradlew :app:assembleDebug :wear:assembleDebug --no-daemon

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             "app/build/outputs/apk/debug/BudControl-${{ steps.version.outputs.tag }}-debug.apk"
          mv wear/build/outputs/apk/debug/wear-debug.apk \
             "wear/build/outputs/apk/debug/BudControl-Wear-${{ steps.version.outputs.tag }}-debug.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "BudControl ${{ steps.version.outputs.tag }}"
          tag_name: ${{ steps.version.outputs.tag }}
          body: |
            ## BudControl ${{ steps.version.outputs.ver }}

            Download the APKs below. Phone APK goes on your Android phone, Wear APK goes on your Wear OS watch.

            ### What's New
            - Sony app coexistence (auto-release/reconnect when Sony app opens)
            - Wide area tap toggle
            - Per-ear touch control mode customization
            - Wear OS companion app (ANC, battery, quick controls)

            ### Install (Phone)
            1. Download `BudControl-${{ steps.version.outputs.tag }}-debug.apk`
            2. Enable "Install from unknown sources" if prompted
            3. Open the app and grant Bluetooth permissions
            4. Tap the Bluetooth icon to pick your paired Sony earbuds

            ### Install (Wear OS)
            1. Download `BudControl-Wear-${{ steps.version.outputs.tag }}-debug.apk`
            2. Sideload via `adb install` to your Wear OS watch
          files: |
            app/build/outputs/apk/debug/BudControl-${{ steps.version.outputs.tag }}-debug.apk
            wear/build/outputs/apk/debug/BudControl-Wear-${{ steps.version.outputs.tag }}-debug.apk
          generate_release_notes: true
          make_latest: true
          draft: false
          prerelease: false
